<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Wavy Sphere FIXED</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, sphere, clock;
let basePositions;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.SphereGeometry(1, 128, 128);

  // ★元の頂点を保存
  basePositions = geometry.attributes.position.array.slice();

  const material = new THREE.MeshStandardMaterial({
    color: 0x00ffcc,
    roughness: 0.3,
    metalness: 0.1
  });

  sphere = new THREE.Mesh(geometry, material);
  scene.add(sphere);

  const light = new THREE.PointLight(0xffffff, 1.2);
  light.position.set(5, 5, 5);
  scene.add(light);

  const ambient = new THREE.AmbientLight(0x404040);
  scene.add(ambient);

  clock = new THREE.Clock();

  window.addEventListener('resize', onResize);
}

function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();
  const position = sphere.geometry.attributes.position;

  for (let i = 0; i < position.count; i++) {

    // ★元データを使う
    let x = basePositions[i * 3];
    let y = basePositions[i * 3 + 1];
    let z = basePositions[i * 3 + 2];

    const normal = new THREE.Vector3(x, y, z).normalize();

    const offset =
      Math.sin(x * 3 + time) * 0.3 +
      Math.sin(y * 3 + time) * 0.3 +
      Math.sin(z * 3 + time) * 0.3;

    position.setXYZ(
      i,
      normal.x * (1 + offset),
      normal.y * (1 + offset),
      normal.z * (1 + offset)
    );
  }

  position.needsUpdate = true;
  sphere.geometry.computeVertexNormals();

  sphere.rotation.y += 0.003;

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
