<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Organic Blob</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, sphere, clock;
let basePositions;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 2.5;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.SphereGeometry(1, 256, 256);

  basePositions = geometry.attributes.position.array.slice();

  const material = new THREE.MeshPhysicalMaterial({
    color: 0x00e5ff,
    roughness: 0.1,
    metalness: 0.2,
    transmission: 0.9, // 透明感
    thickness: 0.5,
    clearcoat: 1,
    clearcoatRoughness: 0.1
  });

  sphere = new THREE.Mesh(geometry, material);
  scene.add(sphere);

  // ライト
  const light1 = new THREE.PointLight(0xffffff, 2);
  light1.position.set(3, 3, 3);
  scene.add(light1);

  const light2 = new THREE.PointLight(0x00ffff, 1.5);
  light2.position.set(-3, -2, 2);
  scene.add(light2);

  const ambient = new THREE.AmbientLight(0x222222);
  scene.add(ambient);

  clock = new THREE.Clock();

  window.addEventListener('resize', onResize);
}

function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();
  const pos = sphere.geometry.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    let x = basePositions[i*3];
    let y = basePositions[i*3+1];
    let z = basePositions[i*3+2];

    const normal = new THREE.Vector3(x, y, z).normalize();

    // 有機的ノイズ（sin重ね）
    const noise =
      Math.sin(x * 2 + time) * 0.15 +
      Math.sin(y * 3 + time * 1.2) * 0.15 +
      Math.sin(z * 4 + time * 0.8) * 0.15;

    pos.setXYZ(
      i,
      normal.x * (1 + noise),
      normal.y * (1 + noise),
      normal.z * (1 + noise)
    );
  }

  pos.needsUpdate = true;
  sphere.geometry.computeVertexNormals();

  sphere.rotation.y += 0.002;
  sphere.rotation.x += 0.001;

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
